<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
</head>
<body>

    <!-- 1. Heading -->
    <h1>Welcome to My Website</h1>
    <marquee>Welcome to My Website!</marquee>

    <!-- 2. Paragraph -->
    <p>This is a simple website made using HTML.</p>

    <!-- 3. Image -->
    <img src="future-webdesign.jpg" alt="Sample Image" width="300" height="200">

    <!-- 4. Link -->
    <p>
        Visit <a href="https://www.google.com" target="_blank">Google</a>
    </p>

    <!-- 5. List -->
    <h2>My Hobbies</h2>
    <ul>
        <li>Reading</li>
        <li>Coding</li>
        <li>Music</li>
    </ul>

    <!-- 6. Table -->
    <h2>Marks</h2>
    <table border="1">
        <tr>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Math</td>
            <td>90</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>85</td>
        </tr>
    </table>

    <!-- 7. Form -->
    <h2>Contact Form</h2>
    <form>
        <!-- 8. Input -->
        Name: <input type="text" placeholder="Enter your name"><br><br>

        <!-- 9. Button -->
        <button type="submit">Submit</button>
    </form>

    <!-- 10. Footer -->
    <footer>
        <p>&copy; 2026 My Simple Website</p>
    </footer>

</body>
</html>
